<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Admin Shop{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: { DEFAULT: "#4F46E5", dark: "#4338CA" },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <!-- Sidebar -->
    <div class="flex h-screen overflow-hidden">
      <aside class="w-64 bg-indigo-900 text-white flex flex-col flex-shrink-0">
        <div
          class="flex items-center gap-3 px-6 py-5 border-b border-indigo-700"
        >
          <div
            class="w-8 h-8 bg-indigo-400 rounded-lg flex items-center justify-center font-bold text-lg"
          >
            S
          </div>
          <span class="font-semibold text-lg tracking-tight">Shop Admin</span>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-1">
          <p
            class="text-indigo-400 text-xs font-semibold uppercase tracking-widest mb-3 px-2"
          >
            Catalogue
          </p>
          <a
            href="/admin/items"
            class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium {% if request.url.path.startswith('/admin/items') %}bg-indigo-700 text-white{% else %}text-indigo-200 hover:bg-indigo-800 hover:text-white{% endif %} transition-colors"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"
              />
            </svg>
            Articles
          </a>
        </nav>

        <div class="px-4 py-4 border-t border-indigo-700">
          <div class="flex items-center gap-3 px-2 mb-3">
            <div
              class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center text-sm font-bold"
            >
              {{ user.first_name[0] | upper }}
            </div>
            <div class="min-w-0">
              <p class="text-sm font-medium text-white truncate">
                {{ user.first_name }} {{ user.last_name }}
              </p>
              <p class="text-xs text-indigo-300 truncate">{{ user.email }}</p>
            </div>
          </div>
          <a
            href="/logout"
            class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-indigo-200 hover:bg-indigo-800 hover:text-white transition-colors w-full"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              />
            </svg>
            Déconnexion
          </a>
        </div>
      </aside>

      <!-- Main content -->
      <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Top bar -->
        <header
          class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between flex-shrink-0"
        >
          <h1 class="text-xl font-semibold text-gray-800">
            {% block page_title %}Dashboard{% endblock %}
          </h1>
          <span class="text-sm text-gray-500"
            >{% block page_subtitle %}{% endblock %}</span
          >
        </header>

        <!-- Page body -->
        <main class="flex-1 overflow-y-auto px-8 py-6">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
  </body>
</html>
