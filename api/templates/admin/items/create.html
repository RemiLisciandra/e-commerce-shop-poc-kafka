{% extends "base.html" %} {% block title %}Nouvel article — Admin Shop{%
endblock %} {% block page_title %}Nouvel article{% endblock %} {% block content
%}
<div class="max-w-2xl">
  <a
    href="/admin/items"
    class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-indigo-600 mb-6 transition-colors"
  >
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M15 19l-7-7 7-7"
      />
    </svg>
    Retour à la liste
  </a>

  <form
    method="POST"
    action="/admin/items/create"
    enctype="multipart/form-data"
    class="bg-white rounded-xl shadow-sm border border-gray-200 divide-y divide-gray-100"
  >
    <!-- Section : Informations générales -->
    <div class="px-6 py-5">
      <h2
        class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-4"
      >
        Informations
      </h2>
      <div class="space-y-4">
        <div>
          <label
            for="title"
            class="block text-sm font-medium text-gray-700 mb-1"
          >
            Titre <span class="text-red-500">*</span>
          </label>
          <input
            id="title"
            name="title"
            type="text"
            required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
            placeholder="Nom du produit"
          />
        </div>

        <div>
          <label
            for="description"
            class="block text-sm font-medium text-gray-700 mb-1"
            >Description</label
          >
          <textarea
            id="description"
            name="description"
            rows="4"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition resize-none"
            placeholder="Description du produit..."
          ></textarea>
        </div>

        <div>
          <label
            for="image"
            class="block text-sm font-medium text-gray-700 mb-1"
            >Image du produit</label
          >
          <input
            id="image"
            name="image"
            type="file"
            accept="image/*"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition file:mr-3 file:py-1 file:px-3 file:rounded file:border-0 file:text-sm file:font-medium file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100"
          />
        </div>
      </div>
    </div>

    <!-- Section : Prix -->
    <div class="px-6 py-5">
      <h2
        class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-4"
      >
        Tarification
      </h2>
      <div class="grid grid-cols-3 gap-4">
        <div>
          <label
            for="price_ht"
            class="block text-sm font-medium text-gray-700 mb-1"
          >
            Prix HT (€) <span class="text-red-500">*</span>
          </label>
          <input
            id="price_ht"
            name="price_ht"
            type="number"
            step="0.01"
            min="0"
            required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
            placeholder="0.00"
            oninput="calcTTC()"
          />
        </div>

        <div>
          <label
            for="tva_rate"
            class="block text-sm font-medium text-gray-700 mb-1"
            >Taux TVA</label
          >
          <select
            id="tva_rate"
            name="tva_rate"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition bg-white"
            onchange="calcTTC()"
          >
            {% for rate in tva_rates %}<option value="{{ rate }}" {% if rate == 20.0 %}selected{% endif %}>{{ rate | int }}%</option>{% endfor %}
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Prix TTC (€)</label
          >
          <div
            class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm bg-gray-50 text-gray-600 font-mono"
            id="price_ttc_display"
          >
            —
          </div>
        </div>
      </div>
    </div>

    <!-- Section : Stock -->
    <div class="px-6 py-5">
      <h2
        class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-4"
      >
        Stock
      </h2>
      <div class="w-40">
        <label
          for="quantity"
          class="block text-sm font-medium text-gray-700 mb-1"
          >Quantité</label
        >
        <input
          id="quantity"
          name="quantity"
          type="number"
          min="0"
          value="0"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
        />
      </div>
    </div>

    <!-- Footer -->
    <div class="px-6 py-4 flex justify-end gap-3">
      <a
        href="/admin/items"
        class="px-4 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-lg transition-colors"
      >
        Annuler
      </a>
      <button
        type="submit"
        class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors"
      >
        Créer l'article
      </button>
    </div>
  </form>
</div>

<script>
  function calcTTC() {
    const ht = parseFloat(document.getElementById("price_ht").value) || 0;
    const rate = parseFloat(document.getElementById("tva_rate").value) || 0;
    const ttc = (ht * (1 + rate / 100)).toFixed(2);
    document.getElementById("price_ttc_display").textContent =
      ht > 0 ? ttc + " €" : "—";
  }
</script>
{% endblock %}
