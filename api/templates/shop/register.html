<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer un compte — ShopItem</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-900 via-indigo-800 to-purple-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/" class="inline-flex items-center gap-2 text-white text-2xl font-bold">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
        </svg>
        ShopItem
      </a>
      <p class="text-indigo-300 text-sm mt-2">Créez votre compte client</p>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
      {% if error %}
      <div class="mb-4 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/register" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Prénom <span class="text-red-500">*</span></label>
            <input name="first_name" type="text" required
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nom <span class="text-red-500">*</span></label>
            <input name="last_name" type="text" required
                   class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
          <input name="email" type="email" required
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                 placeholder="vous@email.com"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe <span class="text-red-500">*</span></label>
          <input name="password" type="password" required minlength="6"
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                 placeholder="6 caractères minimum"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label>
          <input name="phone" type="tel"
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                 placeholder="+33 6 00 00 00 00"/>
        </div>
        <div class="relative">
          <label class="block text-sm font-medium text-gray-700 mb-1">Adresse postale</label>
          <input id="address_search" type="text" autocomplete="off"
                 class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
                 placeholder="Commencez à saisir votre adresse…"/>
          <input type="hidden" name="address" id="address_value"/>
          <ul id="address_suggestions"
              class="hidden absolute z-10 w-full bg-white border border-gray-200 rounded-lg shadow-lg mt-1 max-h-56 overflow-y-auto text-sm">
          </ul>
          <p id="address_selected" class="hidden mt-1 text-xs text-green-600 flex items-center gap-1">
            <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            <span id="address_selected_label"></span>
          </p>
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition-colors text-sm mt-2">
          Créer le compte
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-5">
        Déjà un compte ?
        <a href="/login" class="text-indigo-600 hover:underline font-medium">Se connecter</a>
      </p>
    </div>
  </div>

  <script>
    (function () {
      const searchInput = document.getElementById('address_search');
      const hiddenInput = document.getElementById('address_value');
      const suggestions = document.getElementById('address_suggestions');
      const selectedBox = document.getElementById('address_selected');
      const selectedLabel = document.getElementById('address_selected_label');
      let debounceTimer = null;

      function clearSuggestions() {
        suggestions.innerHTML = '';
        suggestions.classList.add('hidden');
      }

      function selectAddress(label) {
        searchInput.value = label;
        hiddenInput.value = label;
        selectedLabel.textContent = label;
        selectedBox.classList.remove('hidden');
        clearSuggestions();
      }

      searchInput.addEventListener('input', function () {
        const q = this.value.trim();
        hiddenInput.value = '';
        selectedBox.classList.add('hidden');
        clearTimeout(debounceTimer);

        if (q.length < 3) { clearSuggestions(); return; }

        debounceTimer = setTimeout(async function () {
          try {
            const res = await fetch(
              'https://api-adresse.data.gouv.fr/search/?q=' +
              encodeURIComponent(q) + '&limit=6&autocomplete=1'
            );
            const data = await res.json();
            suggestions.innerHTML = '';

            if (!data.features || data.features.length === 0) {
              clearSuggestions(); return;
            }

            data.features.forEach(function (f) {
              const p = f.properties;
              const li = document.createElement('li');
              li.className = 'px-4 py-2.5 cursor-pointer hover:bg-indigo-50 transition-colors border-b border-gray-100 last:border-0';
              li.innerHTML =
                '<span class="font-medium text-gray-800">' + p.label + '</span>' +
                '<br><span class="text-xs text-gray-400">' + p.postcode + ' ' + p.city + '</span>';
              li.addEventListener('mousedown', function (e) {
                e.preventDefault();
                selectAddress(p.label);
              });
              suggestions.appendChild(li);
            });

            suggestions.classList.remove('hidden');
          } catch (_) { clearSuggestions(); }
        }, 300);
      });

      searchInput.addEventListener('blur', function () {
        setTimeout(clearSuggestions, 150);
      });
    })();
  </script>
</body>
</html>
