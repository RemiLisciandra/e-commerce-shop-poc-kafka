version: 2

sources:
  - name: raw
    description: "Tables brutes ingérées par Kafka Connect (JDBC sink depuis Debezium)"
    database: ecommerce_dwh
    schema: public
    tables:
      - name: admins
        description: "Comptes administrateurs"
      - name: items
        description: "Articles du catalogue (réplique CDC MariaDB)"
      - name: customers
        description: "Comptes clients"
      - name: orders
        description: "Commandes"
      - name: order_items
        description: "Lignes de commande"
      - name: payments
        description: "Paiements"
      - name: invoices
        description: "Factures"
